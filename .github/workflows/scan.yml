name: scan jobs

on:
  schedule:
    # שעות שעון ישראל (קיץ, UTC+3). GitHub רץ ב-UTC ובמאמץ מיטבי — ייתכנו עיכובים/דילוגים.
    # הדקות :50 (לא :00) כדי לברוח מהעומס של תחילת השעה.
    - cron: "50 5 * * *"    # 08:50 שעון ישראל
    - cron: "50 9 * * *"    # 12:50 שעון ישראל
    - cron: "50 13 * * *"   # 16:50 שעון ישראל
    - cron: "50 19 * * *"   # 22:50 שעון ישראל
    - cron: "50 0 * * *"    # 03:50 שעון ישראל
  workflow_dispatch:         # run by hand from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scanner.py
        env:
          # Email is optional and OFF unless you add these three secrets:
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
      - name: save results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/jobs.json state.json
          git diff --staged --quiet || git commit -m "update jobs"
          git push
